<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>User Panel</title>

<style>
html {font-size:16px}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;min-height:100vh;overflow-y:auto;font-size:16px}

.header{background:#1e293b;padding:15px;text-align:center;font-size:18px;font-weight:bold;position:sticky;top:0;z-index:100}
.container{min-height:calc(100vh - 52px);display:flex;flex-direction:column;padding-bottom:20px}

/* TYPING BOX ON TOP */
.input-area{display:flex;padding:12px;background:#111827;gap:8px;border-bottom:2px solid #1e293b;position:sticky;top:52px;z-index:90}
.input-area input{flex:1;padding:12px;border:none;border-radius:10px;background:#1e293b;color:white;font-size:16px}
.input-area button{padding:12px 18px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;font-size:16px}

/* CHAT BOX WITH BG IMAGE */
.chat{
    flex:1;
    min-height:400px;
    padding:20px 12px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1000') center/cover;
    border-bottom:2px solid #1e293b;
}
.chat:empty::before{
    content:"👋 Welcome! Type your message below to chat with Pastor";
    color:#e2e8f0;
    text-align:center;
    margin:auto;
    font-size:18px;
    padding:40px 20px;
    background:rgba(0,0,0,0.4);
    border-radius:12px;
}

.msg{padding:12px 16px;border-radius:18px;max-width:75%;font-size:16px;word-wrap:break-word;box-shadow:0 2px 8px rgba(0,0,0,0.4);animation:fadeIn 0.3s ease;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:linear-gradient(135deg, rgba(51,65,155,0.9) 0%, rgba(71,85,105,0.9) 100%);margin-left:auto;text-align:right;border-bottom-right-radius:4px}
.msg.host{background:linear-gradient(135deg, rgba(37,99,235,0.9) 0%, rgba(29,78,216,0.9) 100%);margin-right:auto;border-bottom-left-radius:4px}
.time{font-size:10px;color:#cbd5e1;margin-top:6px;text-align:right}
.img-msg{max-width:220px;border-radius:14px;margin-top:8px;display:block;border:2px solid rgba(255,255,255,0.2)}

/* REPLY BOX */
.reply-box{
    background:rgba(37,99,235,0.2);
    border-left:3px solid #2563eb;
    padding:8px 10px;
    margin-bottom:6px;
    border-radius:6px;
    font-size:13px;
    opacity:0.9;
}
.reply-box b{color:#60a5fa}

/* CAMERA SECTION LAST */
.camera-section{padding:20px;background:#0f172a;margin-top:10px}
.camera-section h4{margin-bottom:12px;font-size:17px;color:#22c55e}
video{width:100%;max-height:260px;background:black;border-radius:12px;border:2px solid #1e293b;object-fit:cover}

/* Join box */
.join-box{padding:30px 20px;text-align:center}
.join-box h3{margin-bottom:15px;color:#60a5fa}
.join-box input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:10px;background:#1e293b;color:white;font-size:16px}
.join-box button{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);color:white;cursor:pointer;font-size:17px;font-weight:bold}
.join-box small{color:#94a3b8;display:block;margin-top:10px}
.room-id-display{color:#22c55e;font-weight:bold;margin-top:10px;font-size:14px}
@media(max-width:768px){html{font-size:16px}}
</style>
</head>
<body>

<div class="header">USER PANEL</div>

<div class="container">

    <!-- JOIN BOX - UID optional now -->
    <div class="join-box" id="joinBox">
        <h3>Chat with Pastor</h3>
        <input type="text" id="userName" placeholder="Enter Your Name" required>
        <input type="text" id="roomId" placeholder="Room ID - Leave empty for private chat">
        <button onclick="joinRoom()">Join Chat</button>
        <small>If host gave you UID, paste it. If not, we’ll create private room for you</small>
        <div class="room-id-display" id="roomDisplay" style="display:none"></div>
    </div>

    <!-- TYPING BOX ON TOP -->
    <div class="input-area" id="inputArea" style="display:none">
        <input type="file" id="imgInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('imgInput').click()">📷</button>
        <input type="text" id="msgInput" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
    </div>

    <!-- CHAT WITH BG IMAGE -->
    <div class="chat" id="chat"></div>

    <!-- CAMERA LAST -->
    <div class="camera-section" id="cameraSection" style="display:none">
        <h4>📹 Your Camera</h4>
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userName = "";
let roomId = "";
let pc = null;

// Auto-fill UID from link if present
window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    if(uid) document.getElementById('roomId').value = uid;
});

// JOIN ROOM - UID OPTIONAL, creates unique room if empty
window.joinRoom = async function(){
    userName = document.getElementById('userName').value.trim();
    const inputRoom = document.getElementById('roomId').value.trim();

    if(!userName){
        alert("Enter your name");
        return;
    }

    // If no UID, create unique room for this user only
    if(inputRoom){
        roomId = inputRoom; // Host gave UID
    } else {
        roomId = 'USER_' + Math.random().toString(36).substring(2,10).toUpperCase();
        document.getElementById('roomId').value = roomId;
        document.getElementById('roomDisplay').style.display = "block";
        document.getElementById('roomDisplay').innerHTML = `Your Room ID: ${roomId}<br><small>Share this with Pastor if needed</small>`;
    }

    const userRef = ref(db, 'users/'+roomId);
    const snap = await get(userRef);

    // Check if blocked only if room exists
    if(snap.exists() && snap.val().blocked){
        alert("⛔ You have been removed by host");
        return;
    }

    document.getElementById('joinBox').style.display = "none";
    document.getElementById('inputArea').style.display = "flex";
    document.getElementById('cameraSection').style.display = "block";

    // Start camera
    navigator.mediaDevices.getUserMedia({video:true,audio:true})
 .then(stream => {
        document.getElementById('localVideo').srcObject = stream;
        startWebRTC(stream);
    })
 .catch(err => console.log("Camera error:", err));

    // Listen for host messages
    onChildAdded(ref(db, 'chats/'+roomId), (snap) => {
        const msg = snap.val();
        if(msg.sender!== userName){
            showMsg(msg.sender, msg.message, msg.image, msg.replyTo);
        }
    });

    // Register user - creates private room
    set(userRef, {
        member: {name:userName, joined:Date.now(), online:true},
        blocked: false,
        status: 'active'
    });
}

// SEND MESSAGE
window.sendMsg = function(){
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;

    push(ref(db, 'chats/'+roomId), {
        sender: userName,
        message: text,
        type: "user",
        time: Date.now()
    });

    showMsg(userName, text);
    input.value = "";
}

// SEND IMAGE
document.getElementById('imgInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(evt){
        push(ref(db, 'chats/'+roomId), {
            sender: userName,
            image: evt.target.result,
            type: "user",
            time: Date.now()
        });
        showMsg(userName, "", evt.target.result);
    }
    reader.readAsDataURL(file);
});

// SHOW MESSAGE + REPLY
function showMsg(sender, text, img="", replyTo=""){
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === userName? 'user' : 'host');

    let content = `<strong style="font-size:12px;opacity:0.8">${sender}</strong><br>`;
    
    if(replyTo){
        content += `<div class="reply-box"><b>${replyTo.sender}</b><br>${replyTo.text}</div>`;
    }
    
    if(text) content += text;
    if(img) content += `<br><img src="${img}" class="img-msg">`;
    content += `<div class="time">${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`;

    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// WEBRTC - user camera only, no host video
async function startWebRTC(stream){
    pc = new RTCPeerConnection({
        iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
    });

    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    pc.ontrack = () => {}; // user cannot see host

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    set(ref(db, 'signals/'+roomId+'/offer'), offer);

    onChildAdded(ref(db, 'signals/'+roomId+'/answer'), async (snap) => {
        const answer = snap.val();
        if(!pc.currentRemoteDescription){
            await pc.setRemoteDescription(answer);
        }
    });

    pc.onicecandidate = e => {
        if(e.candidate){
            push(ref(db, 'signals/'+roomId+'/candidate/member'), e.candidate);
        }
    };

    // Check if blocked live
    onValue(ref(db, 'users/'+roomId+'/blocked'), snap => {
        if(snap.val() === true){
            alert("⛔ You have been removed by host");
            location.reload();
        }
    });
}

// Enter key to send
document.getElementById('msgInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter') sendMsg();
});
</script>
</body>
</html>
