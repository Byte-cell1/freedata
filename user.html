<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>User Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}
body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
}
.header{
    background:#111827;
    padding:15px;
    text-align:center;
}
.container{
    height:calc(100vh - 70px);
    display:flex;
    flex-direction:column;
}
.notice{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:14px;
}
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}
.message{
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    max-width:70%;
}
.user{
    background:#334155;
}
.host{
    background:#2563eb;
    margin-left:auto;
}
.input-area{
    display:flex;
    padding:15px;
    background:#111827;
    gap:8px;
}
.input-area input[type="text"]{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}
.input-area button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
.join-box{
    padding:20px;
    background:#1e293b;
}
.join-box input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}
.join-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
video{
    width:100%;
    max-height:300px;
    background:black;
}
.msg-img{
    max-width:200px;
    border-radius:8px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
    <h2>USER COMMUNICATION PANEL</h2>
</div>

<div class="container">
    <div class="notice">
        By continuing, you agree that the host
        can view your camera stream and any
        image you upload.
    </div>

    <div class="join-box">
        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="uid" placeholder="Enter UID">
        <button id="joinBtn">Join</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <video id="localVideo" autoplay muted playsinline></video>

    <div style="padding:15px;display:flex;gap:8px">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('imageInput').click()">📷 Image</button>
    </div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type message">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// PASTE YOUR SAME FIREBASE CONFIG HERE AS HOST
const firebaseConfig = {
   apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");
let currentUID = null;
let userName = "User";

// Start camera
async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        document.getElementById("localVideo").srcObject = stream;
    }catch(error){
        alert("Camera Permission Denied. Please allow camera in Chrome settings");
    }
}
startCamera();

// FIX: Proper click binding for Join + Send
document.getElementById("joinBtn").addEventListener("click", joinRoom);
document.getElementById("sendBtn").addEventListener("click", sendMessage);

function joinRoom(){
    userName = document.getElementById("name").value.trim();
    currentUID = document.getElementById("uid").value.trim();

    if(userName === "" || currentUID === ""){
        alert("Enter Name and UID");
        return;
    }

    // Read UID from URL if available: member.html?uid=KKAC_123
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('uid')) currentUID = urlParams.get('uid');

    set(ref(db, 'users/'+currentUID+'/member'), {name:userName, joined:Date.now()});
    loadChat(currentUID);
    alert("Connected Successfully. Wait for host to reply");
}

function loadChat(uid){
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = `message ${m.type}`;

        let content = `<strong>${m.sender}:</strong><br>`;
        if(m.message) content += m.message;
        if(m.image) content += `<br><img src="${m.image}" class="msg-img">`;

        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

function sendMessage(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return alert("Join with UID first");

    push(ref(db, 'chats/'+currentUID), {
        sender:userName,
        message:msg,
        type:"user",
        time:Date.now()
    });
    input.value = "";
}

// Image send for member
document.getElementById("imageInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return alert("Join with UID first");

    const reader = new FileReader();
    reader.onload = function(event){
        push(ref(db, 'chats/'+currentUID), {
            sender:userName,
            image:event.target.result,
            type:"user",
            time:Date.now()
        });
    }
    reader.readAsDataURL(file);
});
</script>
</body>
</html>
