<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Panel</title>
<style>
html {font-size:16px}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;min-height:100vh}
.header{background:#1e293b;padding:15px;text-align:center;font-weight:bold;position:sticky;top:0}
.input-area{display:flex;padding:12px;background:#111827;gap:8px;position:sticky;top:52px}
.input-area input{flex:1;padding:12px;border:none;border-radius:10px;background:#1e293b;color:white}
.input-area button{padding:12px 18px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer}
.chat{flex:1;min-height:400px;padding:20px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1000') center/cover}
.msg{padding:12px 16px;border-radius:18px;max-width:75%;font-size:16px;background:rgba(0,0,0,0.6)}
.msg.user{margin-left:auto;background:rgba(51,65,155,0.9)}
.msg.host{margin-right:auto;background:rgba(37,99,235,0.9)}
.reply-box{background:rgba(37,99,235,0.3);border-left:3px solid #2563eb;padding:8px 10px;margin-bottom:6px;border-radius:6px;font-size:13px}
.time{font-size:10px;color:#cbd5e1;margin-top:6px;text-align:right}
video{width:100%;max-height:260px;background:black;border-radius:12px;border:2px solid #1e293b}
.join-box{padding:30px 20px;text-align:center}
.join-box input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:10px;background:#1e293b;color:white}
.join-box button{width:100%;padding:14px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<div class="header">USER PANEL</div>

<div class="join-box" id="joinBox">
    <h3>Chat with Pastor</h3>
    <input type="text" id="userName" placeholder="Enter Your Name" required>
    <input type="text" id="roomId" placeholder="Room ID - Leave empty">
    <button onclick="joinRoom()">Join Chat</button>
    <small style="color:#94a3b8">Leave empty = private room created for you</small>
</div>

<div class="input-area" id="inputArea" style="display:none">
    <input type="file" id="imgInput" accept="image/*" style="display:none">
    <button onclick="imgInput.click()">📷</button>
    <input type="text" id="msgInput" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
</div>

<div class="chat" id="chat"></div>

<div style="padding:20px">
    <h4 style="color:#22c55e;margin-bottom:12px">📹 Your Camera</h4>
    <video id="localVideo" autoplay muted playsinline></video>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",databaseURL:"https://YOUR_PROJECT-default-rtdb.firebaseio.com",projectId:"YOUR_PROJECT",storageBucket:"YOUR_PROJECT.appspot.com",messagingSenderId:"123456",appId:"1:123:web:abc"};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userName = "";
let roomId = "";
let pc = null;

window.joinRoom = async function(){
    userName = userName = document.getElementById('userName').value.trim();
    const inputRoom = document.getElementById('roomId').value.trim();
    if(!userName) return alert("Enter name");

    // CRITICAL: No "general" room. Always private
    roomId = inputRoom || 'USER_' + Math.random().toString(36).substring(2,10).toUpperCase();
    document.getElementById('roomId').value = roomId;

    const snap = await get(ref(db, 'users/'+roomId));
    if(snap.exists() && snap.val().blocked) return alert("Removed by host");

    joinBox.style.display = "none";
    inputArea.style.display = "flex";

    const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    localVideo.srcObject = stream;
    startWebRTC(stream);

    onChildAdded(ref(db, 'chats/'+roomId), snap => {
        const msg = snap.val();
        if(msg.sender!== userName) showMsg(msg.sender, msg.message, msg.image, msg.replyTo);
    });

    set(ref(db, 'users/'+roomId), {member: {name:userName, joined:Date.now(), online:true}, blocked: false});
}

window.sendMsg = function(){
    const text = msgInput.value.trim();
    if(!text) return;
    push(ref(db, 'chats/'+roomId), {sender: userName, message: text, type: "user", time: Date.now()});
    showMsg(userName, text);
    msgInput.value = "";
}

imgInput.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
        push(ref(db, 'chats/'+roomId), {sender: userName, image: evt.target.result, type: "user", time: Date.now()});
        showMsg(userName, "", evt.target.result);
    }
    reader.readAsDataURL(file);
}

function showMsg(sender, text, img="", replyTo=""){
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === userName? 'user' : 'host');
    let content = `<strong style="font-size:12px">${sender}</strong><br>`;
    if(replyTo) content += `<div class="reply-box"><b>${replyTo.sender}</b><br>${replyTo.text}</div>`;
    if(text) content += text;
    if(img) content += `<br><img src="${img}" style="max-width:220px;border-radius:14px;margin-top:8px">`;
    content += `<div class="time">${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function startWebRTC(stream){
    pc = new RTCPeerConnection({iceServers: [{urls: 'stun:stun.l.google.com:19302'}]});
    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    set(ref(db, 'signals/'+roomId+'/offer'), offer);
    onChildAdded(ref(db, 'signals/'+roomId+'/answer'), async snap => {
        if(!pc.currentRemoteDescription) await pc.setRemoteDescription(snap.val());
    });
    pc.onicecandidate = e => {
        if(e.candidate) push(ref(db, 'signals/'+roomId+'/candidate/member'), e.candidate);
    };
}

msgInput.onkeypress = e => {if(e.key === 'Enter') sendMsg();}
</script>
</body>
</html>
