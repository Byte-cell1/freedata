<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>User Panel</title>

<style>
html {font-size:16px}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;height:100vh;overflow:hidden;font-size:16px}
.header{background:#111827;padding:15px;text-align:center;font-size:18px}
.container{height:calc(100vh - 70px);display:flex;flex-direction:column}
.notice{background:#1e293b;padding:15px;text-align:center;font-size:15px}
.chat-box{flex:1;overflow-y:auto;padding:20px;font-size:16px}
.message{padding:12px;border-radius:10px;margin-bottom:10px;max-width:70%;font-size:16px}
.user{background:#334155}
.host{background:#2563eb;margin-left:auto}
.time{font-size:11px;opacity:0.7;margin-top:4px}
.input-area{display:flex;padding:15px;background:#111827;gap:8px}
.input-area input[type="text"]{flex:1;padding:12px;border:none;border-radius:10px;background:#1e293b;color:white;font-size:16px}
.input-area button{padding:12px 20px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;font-size:16px}
.join-box{padding:20px;background:#1e293b}
.join-box input{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:10px;background:#0f172a;color:white;font-size:16px}
.join-box button{width:100%;padding:14px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;font-size:17px}
video{width:100%;max-height:300px;background:black}
.msg-img{max-width:200px;border-radius:8px;margin-top:5px}
@media(max-width:768px){body,input,button,message{font-size:16px}}
</style>
</head>

<body>

<div class="header">
    <h2>USER COMMUNICATION PANEL</h2>
</div>

<div class="container">
    <div class="notice">
        By continuing, you agree that the host
        can view your camera stream and any
        image you upload.
    </div>

    <div class="join-box" id="joinBox">
        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="uid" placeholder="Enter UID">
        <button id="joinBtn">Join</button>
    </div>

    <div class="chat-box" id="chatBox" style="display:none"></div>

    <h4 style="padding:0 20px;display:none" id="yourCamLabel">Your Camera:</h4>
    <video id="localVideo" autoplay muted playsinline style="display:none"></video>

    <!-- REMOVED: Host Camera video tag for member -->

    <div style="padding:15px;display:flex;gap:8px;display:none" id="imgBox">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('imageInput').click()">📷 Image</button>
    </div>

    <div class="input-area" style="display:none" id="chatInput">
        <input type="text" id="message" placeholder="Type message">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");
let currentUID = null;
let userName = "User";
let pc = null;

window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    if(uid) document.getElementById('uid').value = uid;
});

function getTime(){
    const now = new Date();
    return now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

document.getElementById("joinBtn").addEventListener("click", joinRoom);
document.getElementById("sendBtn").addEventListener("click", sendMessage);

async function joinRoom(){
    userName = document.getElementById("name").value.trim();
    currentUID = document.getElementById("uid").value.trim();

    if(userName === "" || currentUID === ""){
        alert("Enter Name and UID");
        return;
    }

    const snap = await get(ref(db, 'users/'+currentUID));
    if(!snap.exists()){
        alert("Invalid UID. Ask host for new link");
        return;
    }
    if(snap.val().blocked){
        alert("⛔ You have been removed by host");
        return;
    }

    document.getElementById("joinBox").style.display = "none";
    chatBox.style.display = "block";
    document.getElementById("yourCamLabel").style.display = "block";
    document.getElementById("localVideo").style.display = "block";
    document.getElementById("imgBox").style.display = "flex";
    document.getElementById("chatInput").style.display = "flex";

    set(ref(db, 'users/'+currentUID+'/member'), {name:userName, joined:Date.now(), online:true});
    loadChat(currentUID);
    startWebRTC(currentUID);
    alert("Connected Successfully. Wait for host");
}

function loadChat(uid){
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = `message ${m.type}`;

        let content = `<strong>${m.sender}:</strong><br>`;
        if(m.message) content += m.message;
        if(m.image) content += `<br><img src="${m.image}" class="msg-img">`;
        content += `<div class="time">${getTime()}</div>`;

        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

function sendMessage(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return alert("Join with UID first");

    push(ref(db, 'chats/'+currentUID), {
        sender:userName,
        message:msg,
        type:"user",
        time:Date.now()
    });
    input.value = "";
}

document.getElementById("imageInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return alert("Join with UID first");

    const reader = new FileReader();
    reader.onload = function(event){
        push(ref(db, 'chats/'+currentUID), {
            sender:userName,
            image:event.target.result,
            type:"user",
            time:Date.now()
        });
    }
    reader.readAsDataURL(file);
});

// WEBRTC - Member sends camera but does NOT receive host video
async function startWebRTC(uid){
    pc = new RTCPeerConnection({iceServers: [{urls: 'stun:stun.l.google.com:19302'}]});

    const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById("localVideo").srcObject = stream;
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    // REMOVED: pc.ontrack = event =>... ← This line makes member see host
    // Now member will NOT see host video

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    set(ref(db, 'signals/'+uid+'/offer'), offer);

    onValue(ref(db, 'signals/'+uid+'/answer'), async snap => {
        if(snap.exists() &&!pc.currentRemoteDescription){
            await pc.setRemoteDescription(snap.val());
        }
    });

    pc.onicecandidate = event => {
        if(event.candidate){
            push(ref(db, 'signals/'+uid+'/candidate/member'), event.candidate.toJSON());
        }
    };

    onChildAdded(ref(db, 'signals/'+uid+'/candidate/host'), snap => {
        if(pc && snap.val()) pc.addIceCandidate(snap.val());
    });

    onValue(ref(db, 'users/'+uid+'/blocked'), snap => {
        if(snap.val() === true){
            alert("⛔ You have been removed by host");
            location.reload();
        }
    });
}
</script>
</body>
</html>
