<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>User Panel - WhatsApp Style</title>
<style>
html {font-size:16px; scroll-behavior:smooth}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:white;min-height:100vh;overflow-x:hidden;width:100%;max-width:100vw}
input,textarea,select{font-size:16px!important}

/* HEADER WHATSAPP STYLE */
.header{background:#1e293b;padding:12px 16px;text-align:center;font-weight:bold;font-size:18px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.4);color:#60a5fa}

/* JOIN BOX */
.join-box{padding:40px 20px;text-align:center;min-height:calc(100vh - 56px);display:flex;flex-direction:column;justify-content:center}
.join-box h3{margin-bottom:18px;color:#60a5fa;font-size:24px}
.join-box input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;background:#1e293b;color:white;font-size:16px;border:2px solid transparent}
.join-box input:focus{border-color:#2563eb;outline:none}
.join-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:white;cursor:pointer;font-size:17px;font-weight:bold;margin-top:12px}
.room-id-display{color:#22c55e;font-weight:bold;margin-top:15px;font-size:14px;padding:10px;background:#1e293b;border-radius:10px}

/* CONTAINER */
.container{min-height:calc(100vh - 56px);display:flex;flex-direction:column;display:none}

/* CAMERA ON TOP */
.camera-section{padding:10px;background:#0f172a;border-bottom:2px solid #1e293b}
.camera-section h4{margin-bottom:8px;color:#22c55e;font-size:14px}
video{width:100%;height:auto;aspect-ratio:16/9;background:black;border-radius:12px;border:2px solid #334155;object-fit:cover;max-height:220px}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(rgba(15,23,42,0.95), rgba(15,23,42,0.95)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1200') center/cover}

/* MESSAGES WHATSAPP BUBBLES */
.msg{padding:8px 12px;border-radius:8px;max-width:75%;font-size:15px;position:relative;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:#2563eb;margin-left:auto;border-bottom-right-radius:2px}
.msg.host{background:#334155;margin-right:auto;border-bottom-left-radius:2px}
.msg-header{font-size:12px;opacity:0.8;margin-bottom:4px;font-weight:bold}
.reply-box{background:rgba(37,99,235,0.3);border-left:3px solid #2563eb;padding:8px 10px;margin-bottom:6px;border-radius:6px;font-size:12px}
.time{font-size:10px;color:#cbd5e1;margin-top:4px;text-align:right;display:flex;justify-content:flex-end;align-items:center;gap:3px}
.read-receipt{font-size:11px;margin-left:4px}
.read-receipt.seen{color:#22c55e}

/* MEDIA */
.msg-img{max-width:240px;border-radius:12px;margin-top:6px;display:block;cursor:pointer}
.msg-audio{width:100%;max-width:280px;margin-top:6px;border-radius:10px}
.msg-file{background:#1e293b;padding:8px 10px;border-radius:8px;margin-top:6px;display:flex;align-items:center;gap:8px;cursor:pointer}
.file-icon{font-size:22px}
.sticker{width:110px;height:110px;margin-top:6px;border-radius:10px}

/* INPUT AREA WHATSAPP */
.input-area{display:flex;padding:10px;background:#1e293b;gap:8px;align-items:flex-end;border-top:2px solid #0f172a}
.input-area input{flex:1;padding:10px 14px;border:none;border-radius:24px;background:#0f172a;color:white;font-size:15px}
.input-btn{width:38px;height:38px;border-radius:50%;border:none;background:#2563eb;color:white;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.input-btn.send{background:#22c55e}
.record-btn{width:38px;height:38px;border-radius:50%;border:none;background:#1e293b;color:white;cursor:pointer;font-size:17px}
.record-btn.recording{background:#dc2626;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000}
.modal-content{background:#1e293b;margin:5% auto;padding:22px;width:90%;max-width:600px;border-radius:14px;border:2px solid #2563eb}
.close-btn{font-size:26px;cursor:pointer;color:#94a3b8;float:right}

/* MOBILE */
@media(max-width:768px){
.header{padding:10px;font-size:16px}
.msg{max-width:85%;font-size:14px}
video{max-height:180px}
.input-area{padding:8px;gap:6px}
.input-btn{width:35px;height:35px;font-size:16px}
}

<body>

<div class="header">👤 Chat with Pastor</div>

<div class="join-box" id="joinBox">
    <h3>Enter Your Name</h3>
    <input type="text" id="userName" placeholder="Your Name" required maxlength="30">
    <input type="text" id="roomId" placeholder="UID - Leave empty for private room">
    <button class="join-btn" id="joinBtn">Join Chat</button>
    <small>Leave UID empty = private room created for you</small>
    <div class="room-id-display" id="roomDisplay" style="display:none"></div>
</div>

<div class="container" id="chatContainer">
    <!-- CAMERA ON TOP -->
    <div class="camera-section">
        <h4>📹 Your Camera</h4>
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <!-- CHAT MIDDLE -->
    <div class="chat" id="chat"></div>

    <!-- INPUT BOTTOM -->
    <div class="input-area">
        <input type="file" id="fileInput" accept="image/*,audio/*,.html,.txt,.pdf" style="display:none">
        <input type="file" id="stickerInput" accept="image/*" style="display:none">
        <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="input-btn" onclick="document.getElementById('stickerInput').click()">😊</button>
        <button class="record-btn" id="recordBtn">🎤</button>
        <input type="text" id="msgInput" placeholder="Type a message">
        <button class="input-btn send" id="sendBtn">➤</button>
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('imageModal').style.display='none'">&times;</span>
        <img id="modalImage" style="width:100%;border-radius:12px">
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userName = "";
let roomId = "";
let pc = null;
let mediaRecorder = null;
let recordingChunks = [];
let userPermissions = {allowMedia:true, allowCamera:true};
let localStream = null;

window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    if(uid) document.getElementById('roomId').value = uid;
});

document.getElementById('joinBtn').addEventListener('click', joinRoom);
document.getElementById('sendBtn').addEventListener('click', sendMsg);
document.getElementById('msgInput').addEventListener('keypress', e => {if(e.key === 'Enter') sendMsg()});
document.getElementById('recordBtn').addEventListener('click', toggleRecording);

async function joinRoom(){
    userName = document.getElementById('userName').value.trim();
    const inputRoom = document.getElementById('roomId').value.trim();

    if(!userName || userName.length < 3){
        alert("Enter name with 3+ characters");
        return;
    }

    roomId = inputRoom || 'USER_' + Math.random().toString(36).substring(2,10).toUpperCase();
    document.getElementById('roomId').value = roomId;

    try {
        const snap = await get(ref(db, 'users/'+roomId));
        if(snap.exists() && snap.val().blocked){
            alert("⛔ Removed by host");
            return;
        }

        document.getElementById('joinBox').style.display = "none";
        document.getElementById('chatContainer').style.display = "flex";

        if(!inputRoom){
            document.getElementById('roomDisplay').style.display = "block";
            document.getElementById('roomDisplay').innerHTML = `Your Room ID: <b>${roomId}</b>`;
        }

        localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        document.getElementById('localVideo').srcObject = localStream;
        startWebRTC(localStream);

        get(ref(db, 'users/'+roomId+'/permissions')).then(snap => {
            if(snap.exists()){
                userPermissions = snap.val();
                updateInputVisibility();
            }
        });

        onChildAdded(ref(db, 'chats/'+roomId), (snap) => {
            const msg = snap.val();
            const msgId = snap.key;
            showMsg(msg.sender, msg.message, msg.image, msg.audio, msg.file, msg.sticker, msg.replyTo, msgId, msg.readBy);
            if(msg.sender === "Host" &&!msg.readBy){
                update(ref(db, 'chats/'+roomId+'/'+msgId), {readBy: userName});
            }
        });

        await set(ref(db, 'users/'+roomId), {
            member: {name:userName, joined:Date.now(), online:true},
            blocked: false,
            status: 'pending',
            approved: false,
            permissions: userPermissions
        });

        onValue(ref(db, 'users/'+roomId+'/blocked'), snap => {
            if(snap.val() === true){
                alert("⛔ Removed by host");
                location.reload();
            }
        });

    } catch(err) {
        alert("Join failed: " + err.message);
    }
}

function updateInputVisibility(){
    document.getElementById('fileInput').disabled =!userPermissions.allowMedia;
    document.getElementById('stickerInput').disabled =!userPermissions.allowMedia;
    document.getElementById('recordBtn').disabled =!userPermissions.allowMedia;
}

function sendMsg(){
    const text = document.getElementById('msgInput').value.trim();
    if(!text ||!roomId) return;
    const newMsgRef = push(ref(db, 'chats/'+roomId));
    set(newMsgRef, {sender: userName, message: text, type: "user", time: Date.now(), readBy: null});
    showMsg(userName, text, "", newMsgRef.key, null);
    document.getElementById('msgInput').value = "";
}

document.getElementById("fileInput").onchange = function(e){
    if(!userPermissions.allowMedia) return alert("Media disabled by host");
    const file = e.target.files[0];
    if(!file ||!roomId) return;
    const reader = new FileReader();
    reader.onload = evt => {
        const msgData = {sender: userName, type: "user", time: Date.now(), readBy: null};
        if(file.type.startsWith('image/')){msgData.image = evt.target.result;}
        else if(file.type.startsWith('audio/')){msgData.audio = evt.target.result;}
        else{msgData.file = {name: file.name, size: Math.round(file.size/1024), url: evt.target.result};}
        const newMsgRef = push(ref(db, 'chats/'+roomId));
        set(newMsgRef, msgData);
        showMsg(userName, "", msgData.image, msgData.audio, msgData.file, "", newMsgRef.key, null);
    };
    reader.readAsDataURL(file);
}

document.getElementById("stickerInput").onchange = function(e){
    if(!userPermissions.allowMedia) return alert("Stickers disabled");
    const file = e.target.files[0];
    if(!file ||!roomId) return;
    const reader = new FileReader();
    reader.onload = evt => {
        const newMsgRef = push(ref(db, 'chats/'+roomId));
        set(newMsgRef, {sender: userName, sticker: evt.target.result, type: "user", time: Date.now(), readBy: null});
        showMsg(userName, "", evt.target.result, "", newMsgRef.key, null);
    };
    reader.readAsDataURL(file);
}

async function toggleRecording(){
    const btn = document.getElementById('recordBtn');
    if(!userPermissions.allowMedia) return alert("Voice disabled");
    if(!roomId) return alert("Join first");
    if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop();
        btn.classList.remove('recording');
        btn.textContent = "🎤";
        return;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);
        recordingChunks = [];
        mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordingChunks, {type: 'audio/webm'});
            const reader = new FileReader();
            reader.onload = () => {
                const newMsgRef = push(ref(db, 'chats/'+roomId));
                set(newMsgRef, {sender: userName, audio: reader.result, type: "user", time: Date.now(), readBy: null});
                showMsg(userName, "", reader.result, "", newMsgRef.key, null);
            };
            reader.readAsDataURL(blob);
        };
        mediaRecorder.start();
        btn.classList.add('recording');
        btn.textContent = "⏹️";
        setTimeout(() => {
            if(mediaRecorder.state === "recording"){
                mediaRecorder.stop();
                btn.classList.remove('recording');
                btn.textContent = "🎤";
            }
        }, 30000);
    } catch(err){
        alert("Mic error: " + err.message);
    }
}

function showMsg(sender, text, img="", audio="", file="", sticker="", replyTo="", msgId="", readBy=""){
    if(document.getElementById('msg-' + msgId)) return;
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === userName? 'user' : 'host');
    div.id = 'msg-' + msgId;

    let content = `<div class="msg-header">${sender}</div>`;
    if(replyTo){content += `<div class="reply-box"><b>${replyTo.sender}</b><br>${replyTo.text}</div>`;}
    if(text) content += text;
    if(img) content += `<br><img src="${img}" class="msg-img" onclick="viewImage('${img}')">`;
    if(audio) content += `<br><audio controls class="msg-audio"><source src="${audio}"></audio>`;
    if(file) content += `<br><div class="msg-file" onclick="downloadFile('${file.url}','${file.name}')"><span class="file-icon">📄</span><div><b>${file.name}</b><br><small>${file.size} KB</small></div></div>`;
    if(sticker) content += `<br><img src="${sticker}" class="sticker">`;

    let receipt = '';
    if(sender === userName){
        receipt = readBy? `<span class="read-receipt seen">✓</span>` : `<span class="read-receipt">✓</span>`;
    }

    const timestamp = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    content += `<div class="time">${timestamp}${receipt}</div>`;
    div.innerHTML = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.viewImage = function(src){
    document.getElementById('modalImage').src = src;
    document.getElementById('imageModal').style.display = "block";
}

window.downloadFile = function(url, name){
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
}

// FIXED WEBRTC - Now listens for host ICE candidates
async function startWebRTC(stream){
    if(pc) {
        pc.getSenders().forEach(sender => pc.removeTrack(sender));
        pc.close();
        pc = null;
    }

    pc = new RTCPeerConnection({iceServers: [
        {urls: 'stun:stun.l.google.com:19302'},
        {urls: 'stun:stun1.l.google.com:19302'}
    ]});

    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    set(ref(db, 'signals/'+roomId+'/offer'), offer);

    onChildAdded(ref(db, 'signals/'+roomId+'/answer'), async (snap) => {
        const answer = snap.val();
        if(!pc.currentRemoteDescription && answer){
            await pc.setRemoteDescription(answer);
        }
    });

    pc.onicecandidate = e => {
        if(e.candidate){
            push(ref(db, 'signals/'+roomId+'/candidate/member'), e.candidate.toJSON());
        }
    };

    // THIS WAS MISSING - Now user receives host ICE
    onChildAdded(ref(db, 'signals/'+roomId+'/candidate/host'), snap => {
        if(pc && snap.val()) pc.addIceCandidate(snap.val());
    });

    pc.onconnectionstatechange = () => {
        console.log("Connection state:", pc.connectionState);
    };
}
</script>
