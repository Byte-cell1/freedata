<!DOCTYPE html>
<html>
<head>
    <title>User Panel</title>
</head>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
}

.header{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:300px;
    background:#1e293b;
    padding:20px;
    overflow-y:auto;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    max-width:70%;
}

.host{
    background:#2563eb;
    margin-left:auto;
}

.user{
    background:#334155;
}

.input-area{
    display:flex;
    padding:15px;
    background:#111827;
}

.input-area input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

.input-area button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.user-card{
    background:#334155;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-height:300px;
}
</style>
<body>

<div class="header">
    <h2>User Communication</h2>
</div>

<div class="container">

    <div class="main">

        <div style="padding:20px;background:#1e293b;">
            <h3>
                By continuing, you agree that the host can view
                your camera stream and uploaded images.
            </h3>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <video id="localVideo" autoplay muted playsinline></video>

        <div style="padding:20px;">

            <input type="text" id="name" placeholder="Enter Name">

            <input type="text" id="uid" placeholder="Enter UID">

            <button onclick="joinRoom()">
                Join
            </button>

        </div>

        <div style="padding:20px;">
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="input-area">

            <input type="text" id="message" placeholder="Message">

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io();

const chatBox = document.getElementById('chatBox');

async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:true
        });

        document.getElementById('localVideo').srcObject = stream;

    }catch(err){

        alert('Camera Permission Denied');

    }
}

startCamera();

function joinRoom(){

    const uid = document.getElementById('uid').value;

    const name = document.getElementById('name').value;

    socket.emit('joinUser',{
        uid,
        name
    });

    alert('Connected Successfully');
}

function sendMessage(){

    const msg = document.getElementById('message').value;

    socket.emit('sendMessage',{
        sender:document.getElementById('name').value,
        message:msg,
        type:'user'
    });

    document.getElementById('message').value = '';
}

socket.on('receiveMessage',(data)=>{

    chatBox.innerHTML += `
        <div class="message ${data.type}">
            <strong>${data.sender}</strong><br>
            ${data.message}
        </div>
    `;
});

const imageInput = document.getElementById('imageInput');

imageInput.addEventListener('change', function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            socket.emit('sendMessage',{

                sender:document.getElementById('name').value,

                message:`
                    <img src="${e.target.result}" width="200">
                `,

                type:'user'
            });
        }

        reader.readAsDataURL(file);
    }
    

});

</script>

</body>
</html>
