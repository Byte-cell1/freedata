<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Host Dashboard</title>

<style>
html {font-size:16px}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;height:100vh;overflow:hidden;font-size:16px}
.header{background:#111827;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.menu-btn{background:#2563eb;border:none;color:white;padding:10px 15px;border-radius:8px;cursor:pointer;font-size:16px}
.container{display:flex;height:calc(100vh - 70px)}
.sidebar{width:300px;background:#1e293b;padding:20px;overflow-y:auto;font-size:16px}
.main{flex:1;display:flex;flex-direction:column}
.chat-box{flex:1;overflow-y:auto;padding:20px;font-size:16px}
.message{padding:12px;margin-bottom:10px;border-radius:10px;max-width:70%;font-size:16px}
.host{background:#2563eb;margin-left:auto}
.user{background:#334155}
.time{font-size:11px;opacity:0.7;margin-top:4px}
.input-area{display:flex;padding:15px;background:#111827;gap:8px}
.input-area input[type="text"]{flex:1;padding:12px;border:none;border-radius:10px;background:#1e293b;color:white;font-size:16px}
.input-area button{padding:12px 20px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;font-size:16px}
.user-card{background:#334155;padding:10px;border-radius:10px;margin-top:10px;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
.online{background:#22c55e}
.offline{background:#64748b}
.btn-small{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-remove{background:#dc2626;color:white}
.btn-restore{background:#16a34a;color:white}
video{width:100%;max-height:300px;background:black}
.msg-img{max-width:250px;border-radius:8px;margin-top:5px}
.remote-video{margin-top:10px;border:2px solid #2563eb;border-radius:10px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000}
.modal-content{background:#1e293b;margin:10% auto;padding:20px;width:90%;max-width:400px;border-radius:10px}
.close-btn{float:right;font-size:24px;cursor:pointer}
@media(max-width:768px){.container{flex-direction:column}.sidebar{width:100%;height:200px} body,input,button,message{font-size:16px}}
</style>
</head>

<body>

<div class="header">
    <h2>HOST DASHBOARD</h2>
    <div>
        <button class="menu-btn" id="menuBtn">☰ Users</button>
        <button id="generateUID">Generate UID</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h3>Generated UID</h3>
        <div id="uidBox">Click button to generate</div>
        <h3 style="margin-top:20px;">Connected Users</h3>
        <div id="users"></div>
    </div>

    <div class="main">
        <div class="chat-box" id="chatBox"></div>
        <h4 style="padding:0 20px">Your Camera:</h4>
        <video autoplay playsinline muted id="hostVideo"></video>
        <h4 style="padding:0 20px;margin-top:10px">Member Camera:</h4>
        <video autoplay playsinline id="remoteVideo" class="remote-video"></video>

        <div class="input-area">
            <input type="text" id="message" placeholder="Type message">
            <input type="file" id="imgInput" accept="image/*" style="display:none">
            <button onclick="document.getElementById('imgInput').click()">📷</button>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<!-- MENU MODAL -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <h3>All Users</h3>
        <div id="allUsersList" style="margin-top:15px"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "123456",
  appId: "1:123:web:abc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");
const uidBox = document.getElementById("uidBox");
let currentUID = null;
let pc = null;

// VIBRATION FUNCTION
function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate([200, 100, 200]); // vibrate pattern
    }
}

// TIMESTAMP FUNCTION
function getTime(){
    const now = new Date();
    return now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

// Host camera
navigator.mediaDevices.getUserMedia({video:true,audio:false})
.then(stream => { document.getElementById('hostVideo').srcObject = stream })
.catch(()=>{});

// Generate UID
document.getElementById("generateUID").addEventListener("click", function(){
    currentUID = 'KKAC_' + Math.random().toString(36).substring(2,10).toUpperCase();
    const link = window.location.origin + '/freedata/member.html?uid=' + currentUID;

    uidBox.innerHTML = `
        <div class="user-card">
            <div>
                <b>UID:</b> ${currentUID}<br>
                <small>Send this link:</small><br>
                <a href="${link}" target="_blank" style="color:#60a5fa;word-break:break-all">${link}</a>
            </div>
        </div>
    `;

    set(ref(db, 'users/'+currentUID), {status:'waiting', joined:Date.now(), blocked:false});
    loadChat(currentUID);
    startWebRTC(currentUID);
    alert("UID Generated! Copy link below");
});

// Load chat with timestamp
function loadChat(uid){
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = `message ${m.type}`;
        let content = `<strong>${m.sender}:</strong><br>`;
        if(m.message) content += m.message;
        if(m.image) content += `<br><img src="${m.image}" class="msg-img">`;
        content += `<div class="time">${getTime()}</div>`;
        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

window.sendMessage = function(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return alert("Generate UID first");
    push(ref(db, 'chats/'+currentUID), {
        sender:"Host", message:msg, type:"host", time:Date.now()
    });
    input.value = "";
}

// Image send
document.getElementById("imgInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;
    const reader = new FileReader();
    reader.onload = function(event){
        push(ref(db, 'chats/'+currentUID), {
            sender:"Host", image:event.target.result, type:"host", time:Date.now()
        });
    }
    reader.readAsDataURL(file);
});

// MENU BUTTON - Show all users
document.getElementById("menuBtn").addEventListener("click", function(){
    document.getElementById("userModal").style.display = "block";
    loadAllUsers();
});

document.getElementById("closeModal").addEventListener("click", function(){
    document.getElementById("userModal").style.display = "none";
});

// Load all users online/offline + remove/restore
function loadAllUsers(){
    onValue(ref(db, 'users'), snap => {
        const allUsersList = document.getElementById("allUsersList");
        allUsersList.innerHTML = "";
        snap.forEach(child => {
            const uid = child.key;
            const data = child.val();
            const status = data.blocked? "offline" : "online";
            const statusColor = data.blocked? "offline" : "online";
            const btnText = data.blocked? "Restore" : "Remove";
            const btnClass = data.blocked? "btn-restore" : "btn-remove";

            const div = document.createElement("div");
            div.className = "user-card";
            div.innerHTML = `
                <div>
                    <span class="status-dot ${statusColor}"></span>
                    <b>${uid}</b><br>
                    <small>${data.name || 'Member'} - ${status}</small>
                </div>
                <button class="btn-small ${btnClass}" onclick="toggleUser('${uid}', ${data.blocked})">${btnText}</button>
            `;
            allUsersList.appendChild(div);
        });
    });
}

// Remove/Restore user
window.toggleUser = function(uid, isBlocked){
    update(ref(db, 'users/'+uid), {blocked:!isBlocked});
    alert(isBlocked? "User Restored" : "User Removed");
}

// VIBRATION when new user joins
onChildAdded(ref(db, 'users'), snap => {
    const data = snap.val();
    if(data.name && data.joined > Date.now() - 5000){ // only new joins
        vibrate();
        alert(`🔔 ${data.name} joined!`);
    }
});

// WebRTC - same as before
async function startWebRTC(uid){
    pc = new RTCPeerConnection({iceServers: [{urls: 'stun:stun.l.google.com:19302'}]});
    const hostStream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    hostStream.getTracks().forEach(track => pc.addTrack(track, hostStream));
    pc.ontrack = event => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
    };
    onValue(ref(db, 'signals/'+uid+'/offer'), async snap => {
        if(snap.exists() &&!pc.currentRemoteDescription){
            await pc.setRemoteDescription(snap.val());
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            set(ref(db, 'signals/'+uid+'/answer'), answer);
        }
    });
    onChildAdded(ref(db, 'signals/'+uid+'/candidate/member'), snap => {
        if(pc && snap.val()) pc.addIceCandidate(snap.val());
    });
    pc.onicecandidate = event => {
        if(event.candidate){
            push(ref(db, 'signals/'+uid+'/candidate/host'), event.candidate.toJSON());
        }
    };
    onValue(ref(db, 'users/'+uid+'/member'), snap => {
        if(snap.exists()){
            document.getElementById('users').innerHTML =
            `<div class="user-card"><span class="status-dot online"></span>👤 ${snap.val().name}<br><small>Live</small></div>`;
        }
    });
}
</script>
</body>
</html>
