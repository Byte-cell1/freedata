<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}
body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
}
.header{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.container{
    display:flex;
    height:calc(100vh - 70px);
}
.sidebar{
    width:300px;
    background:#1e293b;
    padding:20px;
    overflow-y:auto;
}
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}
.message{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    max-width:70%;
}
.host{
    background:#2563eb;
    margin-left:auto;
}
.user{
    background:#334155;
}
.input-area{
    display:flex;
    padding:15px;
    background:#111827;
    gap:8px;
}
.input-area input[type="text"]{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}
.input-area button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
.user-card{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
button{
    cursor:pointer;
}
video{
    width:100%;
    max-height:300px;
    background:black;
}
.msg-img{
    max-width:250px;
    border-radius:8px;
    margin-top:5px;
}
@media(max-width:768px){
   .container{flex-direction:column}
   .sidebar{width:100%;height:200px}
</style>
</head>

<body>

<div class="header">
    <h2>HOST DASHBOARD</h2>
    <button id="generateUID">Generate UID</button>
</div>

<div class="container">
    <div class="sidebar">
        <h3>Generated UID</h3>
        <div id="uidBox">Click button to generate</div>
        <h3 style="margin-top:20px;">Connected Users</h3>
        <div id="users"></div>
    </div>

    <div class="main">
        <div class="chat-box" id="chatBox"></div>
        <video autoplay playsinline controls muted id="hostVideo"></video>

        <div class="input-area">
            <input type="text" id="message" placeholder="Type message">
            <input type="file" id="imgInput" accept="image/*" style="display:none">
            <button onclick="document.getElementById('imgInput').click()">📷</button>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
    apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");
const uidBox = document.getElementById("uidBox");
let currentUID = null;

// FIX 1: Proper click binding for Generate UID
document.getElementById("generateUID").addEventListener("click", function(){
    currentUID = 'KKAC_' + Math.random().toString(36).substring(2,10).toUpperCase();
    const link = window.location.origin + '/freedata/member.html?uid=' + currentUID;

    uidBox.innerHTML = `
        <div class="user-card">
            <b>UID:</b> ${currentUID}<br>
            <small>Send this link:</small><br>
            <a href="${link}" target="_blank" style="color:#60a5fa;word-break:break-all">${link}</a>
        </div>
    `;

    set(ref(db, 'users/'+currentUID), {status:'active', joined:Date.now()});
    loadChat(currentUID);
    alert("UID Generated! Copy the link below and send to member");
});

// Load chat from Firebase so both phones sync
function loadChat(uid){
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = `message ${m.type}`;

        let content = `<strong>${m.sender}:</strong><br>`;
        if(m.message) content += m.message;
        if(m.image) content += `<br><img src="${m.image}" class="msg-img">`;

        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Send text message
window.sendMessage = function(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return alert("Generate UID first");

    push(ref(db, 'chats/'+currentUID), {
        sender:"Host",
        message:msg,
        type:"host",
        time:Date.now()
    });
    input.value = "";
}

// FIX 2: Send image for host
document.getElementById("imgInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;

    const reader = new FileReader();
    reader.onload = function(event){
        push(ref(db, 'chats/'+currentUID), {
            sender:"Host",
            image:event.target.result,
            type:"host",
            time:Date.now()
        });
    }
    reader.readAsDataURL(file);
});

// Host camera - optional
navigator.mediaDevices.getUserMedia({video:true,audio:false})
.then(stream => { document.getElementById('hostVideo').srcObject = stream })
.catch(()=>{});
</script>
</body>
</html>
