<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Dashboard - WhatsApp Advanced</title>
<style>
/* ========== BASE STYLES ========== */
html {font-size:16px; scroll-behavior:smooth}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:white;min-height:100vh;overflow-x:hidden;width:100%;max-width:100vw}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#2563eb;border-radius:4px}
input,textarea,select{font-size:16px!important}

/* ========== HEADER WHATSAPP STYLE ========== */
.header{background:#1e293b;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.header h2{font-size:18px;color:#60a5fa;flex:1}
.header-controls{display:flex;gap:8px;align-items:center}
.menu-btn{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);border:none;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:bold;position:relative}
.badge{background:#dc2626;color:white;padding:2px 6px;border-radius:10px;font-size:11px;margin-left:5px;position:absolute;top:-5px;right:-5px}
.btn{padding:8px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:white;cursor:pointer;font-weight:bold}

/* ========== LAYOUT ========== */
.container{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:320px;background:#1e293b;padding:15px;overflow-y:auto;border-right:2px solid #0f172a;transition:0.3s;display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;background:#0f172a}

/* ========== UID GENERATOR ========== */
.uid-section{background:#0f172a;padding:12px;border-radius:10px;margin-bottom:15px;border:2px solid #1e293b}
.uid-section h3{color:#60a5fa;margin-bottom:8px;font-size:15px}
.uid-box{background:#1e293b;padding:10px;border-radius:8px;font-family:monospace;font-size:13px;word-break:break-all;margin-top:8px}

/* ========== USER LIST WHATSAPP STYLE ========== */
.user-list{flex:1;overflow-y:auto}
.user-card{background:#334155;padding:12px;border-radius:10px;margin-top:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.2s;border-left:4px solid transparent}
.user-card:hover{background:#475569}
.user-card.active{background:#475569;border-left-color:#2563eb}
.user-card.new{border-left-color:#22c55e;animation:pulse 2s infinite}
.user-card.blocked{opacity:0.5;border-left-color:#dc2626}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.user-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:17px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:15px;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-id{font-size:11px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-actions{display:flex;gap:5px;flex-shrink:0}
.btn-sm{padding:5px 8px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-size:12px}
.btn-sm.reject{background:#dc2626}
.btn-sm.camera{background:#16a34a}
.pending-badge{background:#dc2626;color:white;padding:2px 5px;border-radius:8px;font-size:10px;margin-left:4px}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.online{background:#22c55e;box-shadow:0 0 6px #22c55e}
.offline{background:#64748b}

/* ========== CAMERA ON TOP ========== */
.video-wrapper{padding:12px;background:#0f172a;border-bottom:2px solid #1e293b}
video{width:100%;height:auto;aspect-ratio:16/9;background:black;border-radius:12px;border:2px solid #334155;object-fit:cover;max-height:250px}

/* ========== CHAT HEADER ========== */
.chat-header{background:#1e293b;padding:10px 16px;border-bottom:2px solid #0f172a;display:flex;align-items:center;gap:10px}
.chat-header.user-avatar{width:38px;height:38px;font-size:16px}
.status-text{font-size:12px;color:#22c55e}

/* ========== CHAT BOX ========== */
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(rgba(15,23,42,0.95), rgba(15,23,42,0.95)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1200') center/cover;background-attachment:fixed}

/* ========== MESSAGES WHATSAPP BUBBLES ========== */
.message{padding:8px 12px;border-radius:8px;max-width:70%;font-size:15px;position:relative;word-wrap:break-word;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.host{background:#2563eb;margin-left:auto;border-bottom-right-radius:2px}
.user{background:#334155;margin-right:auto;border-bottom-left-radius:2px}
.message-header{font-size:12px;opacity:0.8;margin-bottom:4px;font-weight:bold}
.reply-box{background:rgba(37,99,235,0.3);border-left:3px solid #2563eb;padding:8px 10px;margin-bottom:6px;border-radius:6px;font-size:12px}
.time-stamp{font-size:10px;color:#cbd5e1;margin-top:4px;text-align:right;display:flex;justify-content:flex-end;align-items:center;gap:3px}
.read-receipt{font-size:11px;margin-left:4px}
.read-receipt.seen{color:#22c55e}

/* ========== MEDIA MESSAGES ========== */
.msg-img{max-width:240px;border-radius:12px;margin-top:6px;display:block;cursor:pointer}
.msg-audio{width:100%;max-width:280px;margin-top:6px;border-radius:10px}
.msg-file{background:#1e293b;padding:8px 10px;border-radius:8px;margin-top:6px;display:flex;align-items:center;gap:8px;cursor:pointer}
.msg-file:hover{background:#334155}
.file-icon{font-size:22px}
.sticker{width:110px;height:110px;margin-top:6px;border-radius:10px}

/* ========== INPUT AREA WHATSAPP STYLE ========== */
.input-area{display:flex;padding:10px;background:#1e293b;gap:8px;align-items:flex-end;border-top:2px solid #0f172a}
.input-area input{flex:1;padding:10px 14px;border:none;border-radius:24px;background:#0f172a;color:white;font-size:15px;max-height:120px;resize:none}
.input-btn{width:38px;height:38px;border-radius:50%;border:none;background:#2563eb;color:white;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.input-btn.send{background:#22c55e}

/* ========== PERMISSION PANEL ALWAYS VISIBLE ========== */
.permission-panel{background:#0f172a;padding:12px;border-top:2px solid #334155}
.permission-panel h4{font-size:14px;color:#60a5fa;margin-bottom:8px}
.permission-panel label{display:flex;align-items:center;gap:8px;font-size:14px;margin:6px 0;cursor:pointer}
.permission-panel input[type="checkbox"]{width:18px;height:18px}

/* ========== NOTIFICATION ========== */
.notification{position:fixed;top:65px;right:15px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);padding:15px 18px;border-radius:12px;z-index:9999;display:none;box-shadow:0 6px 18px rgba(0,0,0,0.5);animation:slideDown 0.4s ease;min-width:260px}
@keyframes slideDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
.notification-title{font-weight:bold;font-size:15px;margin-bottom:3px}
.notification-text{font-size:12px;opacity:0.9}

/* ========== MODAL ========== */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;backdrop-filter:blur(5px)}
.modal-content{background:#1e293b;margin:5% auto;padding:22px;width:90%;max-width:500px;border-radius:14px;max-height:85vh;overflow-y:auto;border:2px solid #2563eb}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h3{color:#60a5fa;font-size:19px}
.close-btn{font-size:26px;cursor:pointer;color:#94a3b8;transition:0.3s}
.close-btn:hover{color:#f1f5f9}

/* ========== MOBILE OPTIMIZATION ========== */
@media(max-width:768px){
.header{padding:10px 12px}
.header h2{font-size:16px}
.container{flex-direction:column}
.sidebar{width:100%;position:fixed;left:-100%;height:100vh;z-index:300;transition:0.3s}
.sidebar.active{left:0}
.main{width:100%}
.video-wrapper{padding:8px}
video{max-height:200px}
.message{max-width:85%;font-size:14px;padding:7px 10px}
.msg-img{max-width:190px}
.input-area{padding:8px;gap:6px}
.input-area input{padding:9px 12px;font-size:14px}
.input-btn{width:35px;height:35px;font-size:16px}
.modal-content{width:95%;margin:8% auto;padding:18px}
}

<body>

<div class="header">
    <button class="menu-btn" id="menuBtn">☰ <span id="userCount" class="badge" style="display:none">0</span></button>
    <h2>Pastor Dashboard</h2>
    <div class="header-controls">
        <button class="btn" id="generateUID">+ UID</button>
    </div>
</div>

<div class="notification" id="notification">
    <div class="notification-title">🔔 New User</div>
    <div class="notification-text" id="notifText"></div>
</div>

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="uid-section">
            <h3>Generate UID</h3>
            <button class="btn" id="generateBtn">Generate New UID</button>
            <div class="uid-box" id="uidBox">Click to generate</div>
        </div>

        <h3 style="color:#60a5fa;margin-bottom:12px;font-size:16px">Active Chats</h3>
        <div class="user-list" id="users"></div>

        <!-- PERMISSION PANEL ALWAYS VISIBLE -->
        <div class="permission-panel" id="permissionPanel" style="display:none">
            <h4>Permissions for <span id="permUserName"></span></h4>
            <label><input type="checkbox" id="allowMedia"> Allow Images/Audio/Stickers</label>
            <label><input type="checkbox" id="allowCamera"> Allow Camera Access</label>
            <button class="btn-sm" onclick="savePermissions()" style="width:100%;margin-top:8px">Save Permissions</button>
        </div>
    </div>

    <div class="main">
        <!-- CAMERA ON TOP -->
        <div class="video-wrapper" id="videoWrapper" style="display:none">
            <video autoplay playsinline id="remoteVideo"></video>
        </div>

        <!-- CHAT HEADER -->
        <div class="chat-header" id="chatHeader" style="display:none">
            <div class="user-avatar" id="chatAvatar">U</div>
            <div>
                <div class="user-name" id="chatUserName">Select user</div>
                <div class="status-text" id="chatStatus">Offline</div>
            </div>
        </div>

        <!-- CHAT BOX MIDDLE -->
        <div class="chat-box" id="chatBox">
            <div style="text-align:center;padding:60px 20px;color:#64748b">
                <h3>👋 Welcome Pastor</h3>
                <p style="margin-top:8px">Select a user to start chatting</p>
            </div>
        </div>

        <!-- INPUT BOTTOM -->
        <div class="input-area" id="inputArea" style="display:none">
            <input type="file" id="fileInput" accept="image/*,audio/*,.html,.txt,.pdf" style="display:none">
            <input type="file" id="stickerInput" accept="image/*" style="display:none">
            <button class="input-btn" title="Attach" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="input-btn" title="Sticker" onclick="document.getElementById('stickerInput').click()">😊</button>
            <button class="input-btn" title="Voice" id="recordBtn">🎤</button>
            <input type="text" id="message" placeholder="Type a message">
            <button class="input-btn send" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content" style="max-width:800px;background:transparent;border:none">
        <span class="close-btn" onclick="document.getElementById('imageModal').style.display='none'">&times;</span>
        <img id="modalImage" style="width:100%;border-radius:12px">
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");
let currentUID = null;
let pc = null;
let replyToMsg = null;
let mediaRecorder = null;
let recordingChunks = [];
let hostStream = null;

// Host camera
navigator.mediaDevices.getUserMedia({video:true,audio:false})
.then(stream => {hostStream = stream;})
.catch(err => console.log("Host camera error:", err));

function showNotification(name, roomId){
    const notif = document.getElementById('notification');
    document.getElementById('notifText').innerHTML = `<b>${name}</b> joined<br><small>Room: ${roomId}</small>`;
    notif.style.display = "block";
    document.getElementById('notifSound').play().catch(()=>{});
    setTimeout(() => notif.style.display = "none", 5000);
}

document.getElementById("generateBtn").onclick = function(){
    const uid = 'KKAC_' + Math.random().toString(36).substring(2,10).toUpperCase();
    document.getElementById('uidBox').innerHTML = `<b>UID:</b> ${uid}<br><small>Share with user</small>`;
    set(ref(db, 'users/'+uid), {
        status: 'pending',
        joined: Date.now(),
        blocked: false,
        approved: false,
        permissions: {allowMedia:true, allowCamera:true}
    });
    alert("✅ UID: " + uid);
}

document.getElementById("menuBtn").onclick = () => document.getElementById('sidebar').classList.toggle('active');

// LOAD USERS WITH ACCEPT/REJECT + CAMERA BUTTON
function loadUsers(){
    onValue(ref(db, 'users'), snap => {
        document.getElementById('users').innerHTML = "";
        let count = 0;
        snap.forEach(child => {
            const uid = child.key;
            const data = child.val();
            if(data.member){
                count++;
                const isPending = data.status === 'pending' ||!data.approved;
                const isBlocked = data.blocked;
                const div = document.createElement("div");
                div.className = "user-card" + (uid === currentUID? " active" : "") + (isPending? " new" : "") + (isBlocked? " blocked" : "");
                div.dataset.uid = uid;

                let actions = `<button class="btn-sm camera" onclick="viewUserCamera('${uid}')">👁️</button>`;

                if(isPending){
                    actions = `<button class="btn-sm" onclick="acceptUser('${uid}')">Accept</button>
                               <button class="btn-sm reject" onclick="rejectUser('${uid}')">Reject</button>`;
                }

                div.innerHTML = `
                    <div class="user-avatar">${data.member.name.charAt(0).toUpperCase()}</div>
                    <div class="user-info" onclick="openChat('${uid}')">
                        <div class="user-name">${data.member.name} ${isPending? '<span class="pending-badge">New</span>' : ''}</div>
                        <div class="user-id">${uid}</div>
                    </div>
                    <div class="user-actions">${actions}</div>
                `;
                document.getElementById('users').appendChild(div);
            }
        });
        document.getElementById('userCount').textContent = count;
        document.getElementById('userCount').style.display = count > 0? "inline" : "none";
    });
}

// ACCEPT USER
window.acceptUser = function(uid){
    update(ref(db, 'users/'+uid), {approved:true, status:'active'});
    alert("User approved");
}

// REJECT USER
window.rejectUser = function(uid){
    if(confirm("Reject this user?")){
        update(ref(db, 'users/'+uid), {blocked:true});
    }
}

// VIEW CAMERA BUTTON
window.viewUserCamera = function(uid){
    openChat(uid);
    startWebRTC(uid);
    document.getElementById('videoWrapper').style.display = 'block';
}

// OPEN CHAT
window.openChat = async function(uid){
    currentUID = uid;
    document.getElementById('sidebar').classList.remove('active');

    const userSnap = await get(ref(db, 'users/'+uid));
    const userData = userSnap.val();

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('chatUserName').textContent = userData.member.name;
    document.getElementById('chatAvatar').textContent = userData.member.name.charAt(0).toUpperCase();
    document.getElementById('chatStatus').textContent = userData.member.online? 'Online' : 'Offline';

    // Permission panel always visible
    document.getElementById('permissionPanel').style.display = 'block';
    document.getElementById('permUserName').textContent = userData.member.name;
    document.getElementById('allowMedia').checked = userData.permissions?.allowMedia;
    document.getElementById('allowCamera').checked = userData.permissions?.allowCamera;

    chatBox.innerHTML = "";
    onChildAdded(ref(db, 'chats/'+uid), snap => {
        const m = snap.val();
        if(!document.getElementById('msg-'+snap.key)){
            addMessage(m, snap.key);
            if(m.sender!== "Host" &&!m.readBy){
                update(ref(db, 'chats/'+uid+'/'+snap.key), {readBy: "Host"});
                showNotification(m.sender, uid);
            }
        }
    });

    document.querySelectorAll(`[data-uid="${uid}"]`).forEach(el => el.classList.remove('new'));
}

// SAVE PERMISSIONS
window.savePermissions = function(){
    if(!currentUID) return;
    const perms = {
        allowMedia: document.getElementById('allowMedia').checked,
        allowCamera: document.getElementById('allowCamera').checked
    };
    set(ref(db, 'users/'+currentUID+'/permissions'), perms);
    alert("Permissions saved");
}

function addMessage(m, msgId){
    if(document.getElementById('msg-'+msgId)) return;
    const div = document.createElement("div");
    div.className = `message ${m.type}`;
    div.id = 'msg-'+msgId;

    let content = m.message || '';
    if(m.image) content += `<br><img src="${m.image}" class="msg-img" onclick="viewImage('${m.image}')">`;
    if(m.audio) content += `<br><audio controls class="msg-audio"><source src="${m.audio}"></audio>`;
    if(m.file) content += `<br><div class="msg-file" onclick="downloadFile('${m.file.url}','${m.file.name}')"><span class="file-icon">📄</span><div><b>${m.file.name}</b><br><small>${m.file.size} KB</small></div></div>`;
    if(m.sticker) content += `<br><img src="${m.sticker}" class="sticker">`;

    let receipt = m.type === 'host'? (m.readBy? '<span class="read-receipt seen">✓</span>' : '<span>✓</span>') : '';
    const timestamp = new Date(m.time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    div.innerHTML = content + `<div class="time-stamp">${timestamp}${receipt}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

window.sendMessage = function(){
    const input = document.getElementById("message");
    const msg = input.value.trim();
    if(!msg ||!currentUID) return;
    push(ref(db, 'chats/'+currentUID), {
        sender:"Host", message:msg, type:"host", time:Date.now(), readBy: null
    });
    input.value = "";
}

// WEBRTC
async function startWebRTC(uid){
    if(pc) {
        pc.close();
        pc = null;
    }

    pc = new RTCPeerConnection({iceServers: [
        {urls: 'stun:stun.l.google.com:19302'},
        {urls: 'stun:stun1.l.google.com:19302'}
    ]});

    pc.ontrack = e => {
        console.log("Got remote stream");
        document.getElementById('remoteVideo').srcObject = e.streams[0];
    };

    pc.onicecandidate = e => {
        if(e.candidate) {
            push(ref(db, 'signals/'+uid+'/candidate/host'), e.candidate.toJSON());
        }
    };

    onValue(ref(db, 'signals/'+uid+'/offer'), async snap => {
        if(snap.exists() &&!pc.currentRemoteDescription){
            await pc.setRemoteDescription(snap.val());
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            set(ref(db, 'signals/'+uid+'/answer'), answer);
        }
    });

    // THIS WAS MISSING - Listen for user ICE
    onChildAdded(ref(db, 'signals/'+uid+'/candidate/member'), snap => {
        if(pc && snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}
// FILE UPLOAD
document.getElementById("fileInput").onchange = function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;
    const reader = new FileReader();
    reader.onload = evt => {
        const msgData = {sender: "Host", type: "host", time: Date.now(), readBy: null};
        if(file.type.startsWith('image/')){msgData.image = evt.target.result;}
        else if(file.type.startsWith('audio/')){msgData.audio = evt.target.result;}
        else{msgData.file = {name: file.name, size: Math.round(file.size/1024), url: evt.target.result, type: file.type};}
        push(ref(db, 'chats/'+currentUID), msgData);
    };
    reader.readAsDataURL(file);
}

// STICKER
document.getElementById("stickerInput").onchange = function(e){
    const file = e.target.files[0];
    if(!file ||!currentUID) return;
    const reader = new FileReader();
    reader.onload = evt => {
        push(ref(db, 'chats/'+currentUID), {
            sender: "Host", sticker: evt.target.result, type: "host", time: Date.now(), readBy: null
        });
    };
    reader.readAsDataURL(file);
}

// VOICE RECORD
document.getElementById("recordBtn").onclick = async function(){
    if(!currentUID) return alert("Select user first");
    if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop();
        this.textContent = "🎤";
        this.style.background = "";
        return;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);
        recordingChunks = [];
        mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordingChunks, {type: 'audio/webm'});
            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'chats/'+currentUID), {
                    sender: "Host", audio: reader.result, type: "host", time: Date.now(), readBy: null
                });
            };
            reader.readAsDataURL(blob);
        };
        mediaRecorder.start();
        this.textContent = "⏹️";
        this.style.background = "#dc2626";
        setTimeout(() => {
            if(mediaRecorder.state === "recording"){
                mediaRecorder.stop();
                this.textContent = "🎤";
                this.style.background = "";
            }
        }, 30000);
    } catch(err){
        alert("Mic error: " + err.message);
    }
}
