<!DOCTYPE html>
<html>
<head>
    <title>Host Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
}

.header{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:300px;
    background:#1e293b;
    padding:20px;
    overflow-y:auto;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    max-width:70%;
}

.host{
    background:#2563eb;
    margin-left:auto;
}

.user{
    background:#334155;
}

.input-area{
    display:flex;
    padding:15px;
    background:#111827;
}

.input-area input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

.input-area button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.user-card{
    background:#334155;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-height:300px;
}
</style>
<body>

<div class="header">
    <h2>Host Dashboard</h2>
    <button id="generateUID">Generate UID</button>
</div>

<div class="container">

    <div class="sidebar">

        <h3>Generated UID</h3>
        <div id="uidBox"></div>

        <h3 style="margin-top:20px;">Users</h3>
        <div id="users"></div>

        <h3 style="margin-top:20px;">Removed Users</h3>
        <div id="removedUsers"></div>

    </div>

    <div class="main">

        <div class="chat-box" id="chatBox"></div>

        <video id="remoteVideo" autoplay playsinline></video>

        <div class="input-area">
            <input type="text" id="message" placeholder="Type message">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io();

const chatBox = document.getElementById('chatBox');

document.getElementById('generateUID').onclick = () => {
    socket.emit('generateUID');
};

socket.on('uidGenerated', (uid) => {
    document.getElementById('uidBox').innerHTML = `
        <div class="user-card">
            ${uid}
        </div>
    `;
});

socket.on('userList', (users) => {

    let html = '';

    Object.keys(users).forEach(uid => {

        html += `
            <div class="user-card">
                <h4>${users[uid].name}</h4>
                <p>${uid}</p>

                <button onclick="removeUser('${uid}')">
                    Remove
                </button>
            </div>
        `;
    });

    document.getElementById('users').innerHTML = html;
});

socket.on('removedList', (removed) => {

    let html = '';

    Object.keys(removed).forEach(uid => {

        html += `
            <div class="user-card">
                <h4>${removed[uid].name}</h4>

                <button onclick="restoreUser('${uid}')">
                    Restore
                </button>
            </div>
        `;
    });

    document.getElementById('removedUsers').innerHTML = html;
});

function removeUser(uid){
    socket.emit('removeUser', uid);
}

function restoreUser(uid){
    socket.emit('restoreUser', uid);
}

function sendMessage(){

    const msg = document.getElementById('message').value;

    socket.emit('sendMessage', {
        sender:'Host',
        message:msg,
        type:'host'
    });

    document.getElementById('message').value = '';
}

socket.on('receiveMessage', (data) => {

    chatBox.innerHTML += `
        <div class="message ${data.type}">
            <strong>${data.sender}</strong><br>
            ${data.message}
        </div>
    `;
    
    
});

</script>

</body>
</html>
